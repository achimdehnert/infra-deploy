name: Health Check

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service name (leave empty for all services)"
        required: false
        type: string
        default: ""
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"

jobs:
  health-check:
    name: Health Check ${{ inputs.service || 'all' }}
    runs-on: [self-hosted, prod-server]
    timeout-minutes: 5

    steps:
      - name: Run health checks
        run: |
          bash /opt/infra-deploy/scripts/health-check.sh '${{ inputs.service }}'

      - name: Report result
        if: always()
        run: |
          echo "Health check finished with status: ${{ job.status }}"
