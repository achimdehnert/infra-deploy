name: Run Migrations

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service name (e.g. travel-beat)"
        required: true
        type: string
      backup_first:
        description: "Create DB backup before migrating?"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-production-${{ inputs.service }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate ${{ inputs.service }}
    runs-on: [self-hosted, prod-server]
    timeout-minutes: 10

    steps:
      - name: Backup DB before migration
        if: ${{ inputs.backup_first == true }}
        run: |
          bash /opt/infra-deploy/scripts/db-backup.sh '${{ inputs.service }}'

      - name: Run migrations
        run: |
          bash /opt/infra-deploy/scripts/migrate.sh '${{ inputs.service }}'

      - name: Report result
        if: always()
        run: |
          echo "Migration of ${{ inputs.service }} finished with status: ${{ job.status }}"
