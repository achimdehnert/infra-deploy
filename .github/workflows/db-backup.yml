name: Database Backup

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service name (leave empty for all services)"
        required: false
        type: string
        default: ""
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  backup:
    name: Backup ${{ inputs.service || 'all' }}
    runs-on: [self-hosted, dev-server]
    timeout-minutes: 15

    steps:
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan 88.198.191.108 >> ~/.ssh/known_hosts

      - name: Backup database(s)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          eval $(ssh-agent -s)
          echo "$DEPLOY_SSH_KEY" | ssh-add -
          SERVICE="${{ inputs.service }}"
          if [ -z "$SERVICE" ]; then
            for svc in bfagent risk-hub travel-beat weltenhub; do
              echo "=== Backing up $svc ==="
              ssh root@88.198.191.108 \
                "bash /opt/infra-deploy/scripts/db-backup.sh '$svc'" || true
            done
          else
            ssh root@88.198.191.108 \
              "bash /opt/infra-deploy/scripts/db-backup.sh '$SERVICE'"
          fi

      - name: Report result
        if: always()
        run: |
          echo "Backup finished with status: ${{ job.status }}"
