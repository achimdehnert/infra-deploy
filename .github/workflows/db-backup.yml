name: Database Backup

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service name (leave empty for all services)"
        required: false
        type: string
        default: ""
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  backup:
    name: Backup ${{ inputs.service || 'all' }}
    runs-on: [self-hosted, prod-server]
    timeout-minutes: 30

    steps:
      - name: Backup database(s)
        run: |
          SERVICE="${{ inputs.service }}"
          if [ -z "$SERVICE" ]; then
            for svc in bfagent risk-hub travel-beat weltenhub dev-hub pptx-hub coach-hub trading-hub wedding-hub; do
              echo "=== Backing up $svc ==="
              bash /opt/infra-deploy/scripts/db-backup.sh "$svc" || true
            done
          else
            bash /opt/infra-deploy/scripts/db-backup.sh "$SERVICE"
          fi

      - name: Report result
        if: always()
        run: |
          echo "Backup finished with status: ${{ job.status }}"
